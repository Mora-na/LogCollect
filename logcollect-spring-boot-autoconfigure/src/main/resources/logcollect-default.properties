logcollect.enabled=true
logcollect.global.buffer.total-max-bytes=100MB
logcollect.internal.log-level=INFO
logcollect.global.handler-timeout-ms=5000
logcollect.global.max-nesting-depth=10
logcollect.global.degrade.window-seconds=10
logcollect.degrade.file.encrypt-enabled=false
logcollect.config.local-cache.enabled=true
logcollect.config.local-cache.path=${user.home}/.logcollect/config-cache.properties
logcollect.config.local-cache.max-age-days=7
logcollect.alert.discard-threshold-per-minute=100
